server:
  port: ${PORT:8085}

spring:
  application:
    name: notificationservice


#----Eureka Configuration--------
eureka:
  client:
    service-url:
      defaultZone: https://lms-eureka-server-production.up.railway.app/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
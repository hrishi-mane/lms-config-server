# ============================================================
# Centralised configuration for the LMS service
# Served by config-server at http://localhost:8888/lms/default
# ============================================================

server:
  port: ${PORT:8081}

spring:
  application:
    name: lms

notification:
  service:
    url: http://notificationservice

#----Eureka Configuration--------
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 60      # was default 30
    instance-info-replication-interval-seconds: 60
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
    lease-renewal-interval-in-seconds: 30    # heartbeat frequency (keep at 30)
    lease-expiration-duration-in-seconds: 90 # server waits this long before removing instance

# ---- Rate Limiting (used by RateLimitInterceptor) ----------
lms:
  rate-limit:
    max-requests-per-minute: 20
    window-ms: 60000
  reservation:
    validity-days: 2
  borrowing:
    fine-rate-per-day: 0.25



# ---- Resilience4j Circuit Breaker config -------------------
resilience4j:
  circuitbreaker:
    instances:
      bookService:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 2
        automatic-transition-from-open-to-half-open-enabled: true
      memberService:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 2
        automatic-transition-from-open-to-half-open-enabled: true
  timelimiter:
    instances:
      bookService:
        timeout-duration: 3s
      memberService:
        timeout-duration: 3s
  retry:
    instances:
      notificationService:
        max-attempts: 2
        wait-duration: 2s
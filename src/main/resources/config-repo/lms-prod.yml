# ============================================================
# PROD profile overrides — active when spring.profiles.active=prod
# Served at http://localhost:8888/lms/prod
# ============================================================

lms:
  rate-limit:
    max-requests-per-minute: 20
    window-ms: 60000

resilience4j:
  circuitbreaker:
    instances:
      bookService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
      memberService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s

logging:
  level:
    com.teamoffour.lms: WARN
    root: ERROR
